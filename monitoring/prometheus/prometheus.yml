global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: fx-http
    static_configs:
      - targets:
          - host.docker.internal:9101

  - job_name: fx-grpc
    static_configs:
      - targets:
          - host.docker.internal:9102

  - job_name: fx-rpc
    static_configs:
      - targets:
          - host.docker.internal:9103