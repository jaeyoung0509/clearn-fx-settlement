services:
  postgres:
    image: postgres:16-alpine
    container_name: fx-settlement-postgres
    environment:
      POSTGRES_DB: fx_settlement
      POSTGRES_USER: shopping
      POSTGRES_PASSWORD: shopping
    ports:
      - "5432:5432"
    volumes:
      - fx-settlement-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopping -d fx_settlement"]
      interval: 5s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: fx-settlement-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: fx-settlement-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - fx-settlement-grafana-data:/var/lib/grafana

volumes:
  fx-settlement-postgres-data:
  fx-settlement-grafana-data:
